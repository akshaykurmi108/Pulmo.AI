<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Registration - LungAI</title>

    <link rel="stylesheet" href="signup.css">

</head>

<body>
    <script src="signup.js"></script>

    <!-- NAVBAR -->

    <header>

        <div class="navbar">

            <div class="logo">
                <img src="logo.jpg" alt="PulmoAi"> <span>PulmoAi</span>

            </div>


        </div>

    </header>


    <!-- SIGNUP SECTION -->

    <section class="signup-section">

        <div class="signup-card">

            <div class="doctor-icon">
                <img src="signup.jpg" alt="Signup">
            </div>

            <h1>Doctor Registration</h1>

            <form>

                <label>Full Name</label>
                <input type="text" placeholder="Enter full name">

                <label>Email</label>
                <input type="email" placeholder="Enter email">

                <label>Phone Number</label>
                <input type="text" placeholder="Enter phone number">

                <label>Hospital / Clinic Name</label>
                <input type="text" placeholder="Hospital name">

                <label>Specialization</label>
                <select>
                    <option>Specialization</option>
                    <option>Pulmonologist</option>
                    <option>Radiologist</option>
                    <option>General Physician</option>
                </select>

                <label>Experience (Years)</label>
                <input type="number" value="1">

                <label>License Number</label>
                <input type="text" placeholder="Medical license number">

                <label>About Doctor</label>
                <textarea rows="4"></textarea>

                <p class="login-text">Already have an account? <span><a href="login.html">Login</a></span></p>

                <div class="btn-group">

                    <button class="create-btn">Create Account</button>

                </div>

            </form>

        </div>

    </section>


    <!-- FOOTER -->

    <footer>

        <div class="footer-container">

            <div class="footer-left">

                <p>© Copyright LungAI Diagnosis System</p>

                <p class="disclaimer">
                    Disclaimer info, This system assists doctors in identifying lung diseases faster and improving
                    diagnosis speed and patient care.
                </p>

            </div>

            <div class="footer-right">
                <h4>Quick Links</h4>
                <p><a href="index.html">Home</a></p>
            </div>

        </div>

    </footer>

</body>

</html>
