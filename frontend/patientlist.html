<!DOCTYPE html>
<html>

<head>
    <title>Patients List</title>
    <link rel="stylesheet" href="patientlist.css">
</head>

<body>

    <div id="notification"></div>

    <script src="patientlist.js"></script>

    <!-- NAVBAR -->

    <header>
        <div class="navbar">

            <div class="logo">
                <img src="logo.jpg" alt="PulmoAi">
                <h2>PulmoAi</h2>
            </div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="add-patient.html">New Patient</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="settings.html">Setting</a></li>
            </ul>

            <button class="login-btn"><a href="doctor.html">My Profile</a></button>

        </div>
    </header>


    <!-- PAGE TITLE -->

    <section class="page-title">

        <h1>Patient List</h1>

        <div class="search-filter">

            <!-- SEARCH INPUT -->
            <input id="searchPatient" onkeyup="searchPatient()" placeholder="Search Patient">

            <!-- GENDER FILTER -->
            <select id="genderFilter" onchange="filterGender()">
                <option>All</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <!-- SORT BUTTON -->
            <button onclick="sortPatients()">Sort by Name</button>

            <button class="add-btn"><a href="add-patient.html">+ Add Patient</a></button>

        </div>

    </section>


    <!-- PATIENT TABLE -->

    <section class="table-section">

        <table id="patientTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Scan Type</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>P1023</td>
                    <td>Rahul Shelby</td>
                    <td>45</td>
                    <td>Male</td>
                    <td>CT Scan</td>
                    <td class="complete">Completed</td>
                    <td>
                        <button onclick="viewPatient()">View</button>
                        <button onclick="deletePatient(this)">Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>P1041</td>
                    <td>Anita Sharma</td>
                    <td>38</td>
                    <td>Female</td>
                    <td>X-Ray</td>
                    <td class="processing">Processing</td>
                    <td>
                        <button onclick="viewPatient()">View</button>
                        <button onclick="deletePatient(this)">Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>P1050</td>
                    <td>Kamal Verma</td>
                    <td>50</td>
                    <td>Male</td>
                    <td>CT Scan</td>
                    <td class="pending">Pending</td>
                    <td>
                        <button onclick="viewPatient()">View</button>
                        <button onclick="deletePatient(this)">Delete</button>
                    </td>
                </tr>

            </tbody>

        </table>

    </section>

</body>

</html>
